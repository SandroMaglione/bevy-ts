<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bevy-ts Platformer Example</title>
    <style>
      :root {
        --page-bg:
          radial-gradient(circle at top left, rgba(255, 244, 122, 0.25), transparent 28%),
          radial-gradient(circle at 78% 14%, rgba(77, 186, 114, 0.24), transparent 24%),
          linear-gradient(180deg, #79d5ff 0%, #90dcff 36%, #cfe9ff 100%);
        --panel-bg: rgba(255, 252, 245, 0.78);
        --panel-border: rgba(63, 45, 22, 0.14);
        --text-main: #3a2414;
        --text-muted: #6e5539;
        --text-strong: #23140b;
        --accent: #d94841;
        --accent-cool: #2d8c5b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      [data-platformer-root] {
        width: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--page-bg);
        color: var(--text-main);
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
      }

      .platformer-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .platformer-shell__viewport {
        position: absolute;
        inset: 0;
      }

      .platformer-shell__viewport canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .platformer-hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .platformer-hud__panel {
        position: absolute;
        top: 20px;
        left: 20px;
        width: min(430px, calc(100vw - 40px));
        padding: 16px 18px;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background: var(--panel-bg);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 80px rgba(37, 26, 10, 0.12);
      }

      .platformer-hud__badge {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(217, 72, 65, 0.12);
        color: var(--accent);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .platformer-hud__title {
        margin: 12px 0 8px;
        color: var(--text-strong);
        font-size: clamp(2rem, 4vw, 3.3rem);
        line-height: 0.92;
        letter-spacing: -0.04em;
      }

      .platformer-hud__prompt,
      .platformer-hud__stats,
      .platformer-hud__hint,
      .platformer-overlay__subtitle,
      .platformer-overlay__hint {
        margin: 0;
        line-height: 1.5;
      }

      .platformer-hud__stats {
        margin-top: 10px;
        color: var(--accent-cool);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      }

      .platformer-hud__hint {
        margin-top: 12px;
        color: var(--text-muted);
      }

      .platformer-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(41, 20, 8, 0.24);
        opacity: 0;
        transition: opacity 140ms ease;
      }

      .platformer-overlay__title {
        margin: 0 0 12px;
        color: white;
        font-size: clamp(2.6rem, 8vw, 5rem);
        line-height: 0.9;
        text-align: center;
        letter-spacing: -0.05em;
      }

      .platformer-overlay__subtitle,
      .platformer-overlay__hint {
        max-width: 520px;
        color: rgba(255, 255, 255, 0.92);
        text-align: center;
      }

      .platformer-overlay__hint {
        margin-top: 10px;
        color: rgba(255, 244, 202, 0.96);
      }

      @media (max-width: 720px) {
        .platformer-hud__panel {
          top: 14px;
          left: 14px;
          width: min(430px, calc(100vw - 28px));
          padding: 14px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main data-platformer-root></main>
    <script type="module" src="/src/examples/platformer-browser.ts"></script>
  </body>
</html>
