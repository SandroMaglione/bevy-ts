<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bevy-ts Top-down Example</title>
    <style>
      :root {
        color-scheme: dark;
        --page-bg:
          radial-gradient(circle at top left, rgba(78, 205, 196, 0.14), transparent 28%),
          radial-gradient(circle at 82% 16%, rgba(247, 201, 72, 0.18), transparent 22%),
          linear-gradient(180deg, #071018 0%, #0c141c 42%, #091017 100%);
        --panel-bg: rgba(8, 12, 16, 0.58);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text-main: #f4efe4;
        --text-muted: #aebbc7;
        --text-strong: #ffffff;
        --accent: #4ecdc4;
        --accent-warm: #f7c948;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      [data-top-down-root] {
        width: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--page-bg);
        color: var(--text-main);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      .top-down-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .top-down-shell__viewport {
        position: absolute;
        inset: 0;
      }

      .top-down-shell__viewport canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .top-down-hud {
        position: absolute;
        top: 24px;
        left: 24px;
        width: min(460px, calc(100vw - 48px));
        padding: 18px 18px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background: var(--panel-bg);
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.3);
        pointer-events: none;
      }

      .top-down-hud__badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(78, 205, 196, 0.12);
        color: var(--accent);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .top-down-hud__title {
        margin: 0 0 10px;
        color: var(--text-strong);
        font-size: clamp(2rem, 4vw, 3.6rem);
        line-height: 0.92;
        letter-spacing: -0.05em;
      }

      .top-down-hud__prompt,
      .top-down-hud__stats,
      .top-down-hud__hint {
        margin: 0;
        line-height: 1.55;
      }

      .top-down-hud__prompt {
        color: var(--text-main);
        font-size: 1rem;
      }

      .top-down-hud__stats {
        margin-top: 10px;
        color: var(--accent-warm);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 0.95rem;
      }

      .top-down-hud__hint {
        margin-top: 12px;
        color: var(--text-muted);
        font-size: 0.94rem;
      }

      @media (max-width: 720px) {
        .top-down-hud {
          top: 14px;
          left: 14px;
          width: min(calc(100vw - 28px), 460px);
          padding: 15px;
          border-radius: 18px;
        }

        .top-down-hud__title {
          font-size: clamp(1.8rem, 10vw, 2.6rem);
        }
      }
    </style>
  </head>
  <body>
    <main data-top-down-root></main>
    <script type="module" src="./browser.ts"></script>
  </body>
</html>
