<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bevy-ts Browser Examples</title>
    <style>
      :root {
        color-scheme: dark;
        --page-bg:
          radial-gradient(circle at top, rgba(255, 207, 86, 0.16), transparent 26%),
          radial-gradient(circle at 84% 18%, rgba(78, 205, 196, 0.12), transparent 20%),
          linear-gradient(180deg, #0a0f13 0%, #131b23 50%, #091017 100%);
        --panel-bg: rgba(9, 12, 16, 0.82);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text-main: #f3efe4;
        --text-muted: #a6b3c0;
        --button-bg: rgba(255, 255, 255, 0.04);
        --button-active: #f7c948;
        --button-active-text: #17212b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page-bg);
        color: var(--text-main);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 40px;
      }

      .hero {
        display: grid;
        gap: 14px;
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 0;
        color: var(--text-muted);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 4vw, 4.4rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .copy {
        max-width: 760px;
        margin: 0;
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1.65;
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: var(--panel-bg);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
        overflow: hidden;
      }

      .example-switcher {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .example-switcher__button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--button-bg);
        color: var(--text-main);
        border-radius: 999px;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
        transition: background 150ms ease, color 150ms ease, border-color 150ms ease, transform 150ms ease;
      }

      .example-switcher__button:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.16);
      }

      .example-switcher__button[data-active="true"] {
        background: var(--button-active);
        color: var(--button-active-text);
        border-color: rgba(247, 201, 72, 0.8);
      }

      .stage-meta {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        padding: 16px 18px;
        border-bottom: 1px solid var(--panel-border);
        color: var(--text-muted);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 12px;
        text-transform: uppercase;
      }

      .stage-meta span {
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
      }

      .pixi-example-shell {
        min-height: min(72vh, 760px);
      }

      .pixi-example-shell-grid {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 22px;
      }

      .pixi-example-shell-grid canvas {
        width: min(420px, 100%) !important;
        max-width: 100%;
        height: auto !important;
        aspect-ratio: 1 / 1;
        image-rendering: pixelated;
        border-radius: 16px;
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.34);
      }

      .pixi-example-shell canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 20px, 1120px);
          padding-top: 20px;
        }

        .panel {
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow" data-example-eyebrow>PixiJS loop, bevy-ts ECS</p>
        <h1 data-example-title>External runtime, typed game logic.</h1>
        <p class="copy" data-example-description>
          Pixi owns the canvas and ticker. The ECS side stays in <code>bevy-ts</code>: descriptors,
          schema, systems, resources, commands, schedules, and service wiring all live in the example source.
        </p>
      </section>

      <nav class="example-switcher" data-example-controls></nav>

      <section class="panel">
        <div class="stage-meta" data-example-meta></div>
        <div data-example-root></div>
      </section>
    </main>

    <script type="module" src="./browser.ts"></script>
  </body>
</html>
